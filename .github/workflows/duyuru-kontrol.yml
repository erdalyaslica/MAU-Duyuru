name: Maltepe Duyuru Kontrol

on:
  workflow_dispatch:
    inputs:
      send_test_email:
        description: "Yalnızca test e-postası gönder"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 14 * * *"

concurrency:
  group: mau-duyuru
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-announcements:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: "requirements.txt"
      - run: pip install -r requirements.txt
      - name: Duyuruları kontrol et
        env:
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPEDO_TOKEN: ${{ secrets.SCRAPEDO_TOKEN }}
          SEND_TEST_EMAIL: ${{ inputs.send_test_email || 'false' }}
        run: python src/mau_duyuru.py
      - name: Güncel duyuru listesini Files bölümüne kaydet
        if: success() && hashFiles('data/duyurular.csv') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "data/duyurular.csv"
          if git diff --cached --quiet; then
            echo "Duyuru listesinde değişiklik yok."
          else
            git commit -m "Duyuru listesini güncelle [skip ci]"
            git push
          fi
      - name: İndirilebilir duyuru listesini yayınla
        if: success() && hashFiles('data/duyurular.csv') != ''
        uses: actions/upload-artifact@v4
        with:
          name: duyuru-listesi-${{ github.run_number }}
          path: "data/duyurular.csv"
          retention-days: 30
